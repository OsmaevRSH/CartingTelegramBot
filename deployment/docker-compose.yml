services:
  carting-bot:
    build:
      context: ../
      dockerfile: deployment/docker/Dockerfile
    container_name: carting-bot
    restart: unless-stopped
    user: "0:0"
    privileged: true
    cap_add:
      - ALL
    security_opt:
      - seccomp:unconfined
    env_file:
      - ../.env
    environment:
      - DATABASE_PATH=/app/data/races.db
      - LOG_FILE=/app/logs/bot.log
    volumes:
      - ../data:/app/data:rw,Z
      - ../logs:/app/logs:rw,Z
      - ../config:/app/config:rw,Z
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    networks:
      - carting-network
    healthcheck:
      test: ["CMD", "python", "utils/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  carting-network:
    driver: bridge 
